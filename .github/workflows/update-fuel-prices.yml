name: Update Fuel Prices

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

permissions:
  contents: write           # Needed to commit fuel-prices.json back to the repo

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest fuel prices
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python3 scripts/update-fuel-prices.py

      - name: Commit updated prices
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fuel-prices.json
          git diff --staged --quiet \
            && echo "No price changes — nothing to commit." \
            || git commit -m "chore: update fuel prices $(date +%Y-%m-%d)"

      - name: Push
        run: git push
